name: Validate and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Validating marketplace.json..."
          jq . .claude-plugin/marketplace.json > /dev/null
          echo "Validating plugin.json..."
          jq . .claude-plugin/plugin.json > /dev/null

      - name: Validate plugin/marketplace version alignment
        run: |
          PLUGIN_NAME=$(jq -r '.name' .claude-plugin/plugin.json)
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKET_VERSION=$(jq -r --arg n "$PLUGIN_NAME" \
            '.plugins[] | select(.name == $n) | .version' \
            .claude-plugin/marketplace.json)

          if [ -z "$MARKET_VERSION" ] || [ "$MARKET_VERSION" = "null" ]; then
            echo "ERROR: plugin '$PLUGIN_NAME' not found in marketplace.json"
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$MARKET_VERSION" ]; then
            echo "ERROR: version mismatch"
            echo "  plugin.json: $PLUGIN_VERSION"
            echo "  marketplace.json ($PLUGIN_NAME): $MARKET_VERSION"
            exit 1
          fi
          echo "OK: $PLUGIN_NAME @ $PLUGIN_VERSION"

      - name: Validate skill references
        run: |
          echo "Checking skill folders..."
          jq -r '.skills[]' .claude-plugin/plugin.json | while read -r source; do
            clean_source="${source#./}"
            file="${clean_source}/SKILL.md"
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing SKILL.md: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Validate YAML frontmatter
        run: |
          echo "Checking YAML frontmatter in skills..."
          find skills -name "SKILL.md" | while read -r file; do
            if ! head -1 "$file" | grep -q "^---$"; then
              echo "ERROR: Missing YAML frontmatter in $file"
              exit 1
            fi
            frontmatter=$(awk '/^---$/{c++; next} c==1' "$file")
            if [ -z "$frontmatter" ]; then
              echo "ERROR: Empty or unterminated YAML frontmatter in $file"
              exit 1
            fi
            if ! printf '%s\n' "$frontmatter" | grep -q "^name:"; then
              echo "ERROR: Missing 'name' in $file frontmatter"
              exit 1
            fi
            if ! printf '%s\n' "$frontmatter" | grep -q "^description:"; then
              echo "ERROR: Missing 'description' in $file frontmatter"
              exit 1
            fi
            dir_name=$(basename "$(dirname "$file")")
            skill_name=$(printf '%s\n' "$frontmatter" | grep -m1 "^name:" | sed 's/^name: *//')
            if [ "$dir_name" != "$skill_name" ]; then
              echo "ERROR: directory name '$dir_name' does not match skill name '$skill_name' in $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Summary
        run: |
          echo "=== Marketplace Summary ==="
          echo "Plugin: $(jq -r '.name' .claude-plugin/plugin.json)"
          echo "Version: $(jq -r '.version' .claude-plugin/plugin.json)"
          echo "Skills: $(jq '.skills | length' .claude-plugin/plugin.json)"

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches plugin version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: tag v$TAG does not match plugin.json version $VERSION"
            exit 1
          fi
          echo "OK: tag v$TAG matches plugin version"

      - name: Generate release notes
        run: |
          PLUGIN_NAME=$(jq -r '.name' .claude-plugin/plugin.json)
          MARKET_NAME=$(jq -r '.name' .claude-plugin/marketplace.json)
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          SKILLS=$(jq '.skills | length' .claude-plugin/plugin.json)

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > notes.md << 'HEADER'
          ## What's in this release

          HEADER

          echo "This release includes **$SKILLS skills** in the \`$PLUGIN_NAME\` plugin." >> notes.md
          echo "" >> notes.md

          echo "### Skills" >> notes.md
          echo "" >> notes.md
          jq -r '.skills[]' .claude-plugin/plugin.json | while read -r source; do
            clean_source="${source#./}"
            file="${clean_source}/SKILL.md"
            if [ -f "$file" ]; then
              frontmatter=$(awk '/^---$/{c++; next} c==1' "$file")
              skill_name=$(printf '%s\n' "$frontmatter" | grep -m1 "^name:" | sed 's/^name: *//')
              skill_desc=$(printf '%s\n' "$frontmatter" | grep -m1 "^description:" | sed 's/^description: *//' | head -c 200)
              echo "- \`$skill_name\`: ${skill_desc}" >> notes.md
            fi
          done
          echo "" >> notes.md

          cat >> notes.md << INSTALL
          ## Installation

          Run these inside Claude Code:

          \`\`\`text
          /plugin marketplace add $GITHUB_REPOSITORY
          /plugin install $PLUGIN_NAME@$MARKET_NAME
          \`\`\`
          INSTALL

          if [ -n "$PREV_TAG" ]; then
            echo "" >> notes.md
            echo "## Changes since $PREV_TAG" >> notes.md
            echo "" >> notes.md
            git log --oneline "$PREV_TAG"..HEAD >> notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          generate_release_notes: false
